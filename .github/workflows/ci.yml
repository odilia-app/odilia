name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
jobs:
  test:
    runs-on: ubuntu-latest
    needs: [rustfmt,deny,rustdoc]
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Git checkout
        uses: actions/checkout@v6

      - name: Cache cargo home
        uses: actions/cache@v5
        env:
          cache-name: cache-cargo-home
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Install Dependencies
        run: sudo apt -y install at-spi2-core systemd dunst xvfb
      - name: setup dbus and notification daemon
        run:
          sudo systemctl start dbus;
          systemctl --user start dbus;
          xvfb-run dunst --screen 0 600x400x8 &
      - name: Run tests
        # we need to run in release because proptests are slow;
        # if you think compiling is slow, try running proptests without release mode :)
        run: cargo test --workspace --release --features proptest
  multi-platform:
    runs-on: ${{ matrix.runner }}
    needs: [test,deny,coverage,rustdoc,rustfmt,clippy]
    if: ${{ !github.event.pull_request.draft }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            arch: x86_64
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            arch: aarch64
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - name: Git checkout
        uses: actions/checkout@v6

      - name: Cache cargo home
        uses: actions/cache@v5
        env:
          cache-name: cache-cargo-home
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ matrix.target }}-build-${{ env.cache-name }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-build-${{ env.cache-name }}-
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libevdev-dev linux-headers-generic clang dbus-x11 dunst xvfb at-spi2-core systemd
          if [[ "${{ matrix.target }}" == *-musl ]]; then
            sudo apt install -y musl-tools musl-dev autoconf automake libtool pkg-config make
            # Linux UAPI headers (linux/, asm-generic/, asm/) aren't on musl-gcc's
            # search path under -nostdinc; expose them via the musl sysroot.
            sudo ln -sf /usr/include/linux                            /usr/include/${{ matrix.arch }}-linux-musl/linux
            sudo ln -sf /usr/include/asm-generic                      /usr/include/${{ matrix.arch }}-linux-musl/asm-generic
            sudo ln -sf /usr/include/${{ matrix.arch }}-linux-gnu/asm /usr/include/${{ matrix.arch }}-linux-musl/asm
          fi
      - name: Setup dbus and notification daemon
        run: |
          sudo systemctl start dbus
          systemctl --user start dbus
          xvfb-run dunst --screen 0 600x400x8 &
      - name: Test ${{ matrix.target }}
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          CC_aarch64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: cargo test --target ${{ matrix.target }} --locked --workspace
  deny:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Git checkout
        uses: actions/checkout@v6

      - name: Cache cargo home
        uses: actions/cache@v5
        env:
          cache-name: cache-cargo-home
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-x86_64-unknown-linux-gnu-build-${{ env.cache-name }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-x86_64-unknown-linux-gnu-build-${{ env.cache-name }}-
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Run cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # do not check sources; as this will almost always error due to stale windows' dependencies that we don't need.
          command: check license advisories bans
  clippy:
    needs: [rustfmt,deny,rustdoc]
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Git checkout
        uses: actions/checkout@v6

      - name: Cache cargo home
        uses: actions/cache@v5
        env:
          cache-name: cache-cargo-home
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-x86_64-unknown-linux-gnu-build-${{ env.cache-name }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-x86_64-unknown-linux-gnu-build-${{ env.cache-name }}-
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: clippy
      - uses: taiki-e/install-action@cargo-hack
      - name: Clippy hack
        run: cargo hack --feature-powerset clippy --benches --examples --tests --workspace --no-deps -- -D warnings
  rustfmt:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Git checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          profile: minimal
          toolchain: nightly
          components: rustfmt
      - name: Run formatter
        run: cargo fmt --all --check

  rustdoc:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Git checkout
        uses: actions/checkout@v6

      - name: Cache cargo home
        uses: actions/cache@v5
        env:
          cache-name: cache-cargo-home
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-x86_64-unknown-linux-gnu-build-${{ env.cache-name }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-x86_64-unknown-linux-gnu-build-${{ env.cache-name }}-
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
      - name: Generate Documentation
        run: cargo doc --workspace --document-private-items

      - name: Deploy Documentation
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.PAGES_DEPLOY_KEY }}
          external_repository: odilia-app/odilia-app.github.io
          publish_dir: ./target/doc
          destination_dir: doc/devel
          keep_files: true
          user_name: github-actions
          user_email: actions@github.com
          publish_branch: main
        if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
  coverage:
    needs: [clippy,test]
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
      - name: Cache cargo home
        uses: actions/cache@v5
        env:
          cache-name: cache-cargo-home
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ matrix.target }}-build-${{ env.cache-name }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-build-${{ env.cache-name }}-
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: llvm-tools
      - name: cargo install llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: cargo generate lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      - name: Install Dependencies
        run: sudo apt -y install at-spi2-core systemd dunst xvfb
      - name: setup dbus and notification daemon
        run:
          sudo systemctl start dbus;
          systemctl --user start dbus;
          xvfb-run dunst --screen 0 600x400x8 &
      - name: cargo llvm-cov
        run: cargo llvm-cov --lcov --output-path lcov.info
      - name: Upload to codecov.io
        uses: codecov/codecov-action@v6
        with:
          fail_ci_if_fail: true

  nix:
    needs: [test,deny,coverage,rustdoc,rustfmt,clippy]
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v31
      # Remove the runner's pre-installed rustup proxy from ~/.cargo/bin so the
      # nixpkgs cargo/rustc from the devshell are used unambiguously. Otherwise
      # `nix develop --command cargo` can resolve to the rustup proxy on PATH,
      # which triggers a toolchain install into ~/.rustup. That install has
      # occasionally raced with itself, producing "downloading 6 components"
      # twice and corrupting partial downloads.
      - name: Remove host rustup to avoid PATH collision
        run: rm -rf ~/.cargo ~/.rustup
      - name: Run tests
        run: nix develop --command cargo build --tests --workspace
  correct-minimum-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
      - name: Generate lockfile with minimal direct versions
        # Create a lockfile with minimal direct versions for reproducible builds.
        # See advisory: https://blog.rust-lang.org/2023/08/29/committing-lockfiles/
        run: cargo +nightly generate-lockfile -Z direct-minimal-versions
  no-unused-dependencies:
    runs-on: ubuntu-latest
    needs: [rustfmt]
    steps:
      - name: Git checkout
        uses: actions/checkout@v6
      - name: Cache cargo home
        uses: actions/cache@v5
        env:
          cache-name: cache-cargo-home
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-x86_64-unknown-linux-gnu-build-${{ env.cache-name }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-x86_64-unknown-linux-gnu-build-${{ env.cache-name }}-
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Install Cargo Machete
        uses: taiki-e/install-action@cargo-machete
      - name: Check For Unused Dependencies
        run: cargo machete
